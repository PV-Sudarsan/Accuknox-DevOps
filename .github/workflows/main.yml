name: Wisecow CI/CD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: wisecow
  NAMESPACE: wisecow

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.export-image.outputs.image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        id: export-image
        run: |
          echo "image=ghcr.io/${{ github.repository_owner }}/wisecow:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wisecow:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/wisecow:latest

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify kubectl access
        run: |
          kubectl get nodes

      - name: Create namespace if missing
        run: |
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Update deployment image
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|${{ needs.build-and-push.outputs.image }}|g" deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -n $NAMESPACE -f deployment.yaml
          kubectl apply -n $NAMESPACE -f ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/wisecow -n $NAMESPACE --timeout=180s
