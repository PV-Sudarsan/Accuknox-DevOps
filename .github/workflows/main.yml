name: Wisecow CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: wisecow
  NAMESPACE: wisecow
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: echo "image=${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify kubectl access
        run: kubectl get nodes

      - name: Create namespace
        run: kubectl apply -f deployment.yaml

      - name: Create or update TLS secret
        env:
          TLS_CRT: ${{ secrets.TLS_CRT }}
          TLS_KEY: ${{ secrets.TLS_KEY }}
        run: |
          test -n "$TLS_CRT"
          test -n "$TLS_KEY"
          printf '%s' "$TLS_CRT" > tls.crt
          printf '%s' "$TLS_KEY" > tls.key
          kubectl -n $NAMESPACE create secret tls wisecow-tls \
            --cert=tls.crt \
            --key=tls.key \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f tls.crt tls.key

      - name: Render deployment image
        run: sed -i "s|IMAGE_PLACEHOLDER|${{ needs.build-and-push.outputs.image }}|g" deployment.yaml

      - name: Apply manifests
        run: |
          kubectl apply -f deployment.yaml
          kubectl apply -f ingress.yaml

      - name: Wait for rollout
        run: kubectl rollout status deployment/wisecow -n $NAMESPACE --timeout=180s
