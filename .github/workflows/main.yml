name: Local Runner CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: wisecow
  NAMESPACE: wisecow
  INGRESS_HOST: wisecow.local

jobs:
  build-and-deploy:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Runner info
        run: |
          uname -a
          docker --version
          kubectl version --client

      - name: Check shellcheck
        run: |
          command -v shellcheck >/dev/null 2>&1 || {
            echo "shellcheck is required on the self-hosted runner"
            exit 1
          }

      - name: Lint shell scripts
        run: |
          bash -n wisecow.sh
          bash -n scripts/system_health_monitor.sh
          bash -n scripts/app_health_checker.sh
          bash -n scripts/generate-tls-cert.sh
          shellcheck wisecow.sh scripts/system_health_monitor.sh scripts/app_health_checker.sh scripts/generate-tls-cert.sh

      - name: Set image variables
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_REF=ghcr.io/${OWNER_LC}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=ghcr.io/${OWNER_LC}/${IMAGE_NAME}:latest" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t "${IMAGE_REF}" -t "${IMAGE_LATEST}" .

      - name: Push image
        run: |
          docker push "${IMAGE_REF}"
          docker push "${IMAGE_LATEST}"

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Generate TLS cert
        run: |
          ./scripts/generate-tls-cert.sh "${INGRESS_HOST}" certs

      - name: Create namespace and TLS secret
        run: |
          kubectl create namespace "${NAMESPACE}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n "${NAMESPACE}" create secret tls wisecow-tls \
            --cert=certs/tls.crt \
            --key=certs/tls.key \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -k k8s

      - name: Update deployment image
        run: |
          kubectl -n "${NAMESPACE}" set image deployment/wisecow wisecow="${IMAGE_REF}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/wisecow -n "${NAMESPACE}" --timeout=180s
